<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="traffic light" data-gradient="vertical">
  <!-- Reusable stencil for the WLED palette "traffic light". Fill by injecting the palette's
       own colours (from /json/palx) as stops into #grad below. Details in #1a1a1a
       carve features. Gradient direction: vertical. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><rect x="48" y="14" width="48" height="116" rx="16"/><circle cx="72" cy="40" r="13" fill="#1a1a1a"/><circle cx="72" cy="72" r="13" fill="#1a1a1a"/><circle cx="72" cy="104" r="13" fill="#1a1a1a"/></g>
</svg>
