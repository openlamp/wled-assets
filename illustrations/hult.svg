<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="hult" data-gradient="vertical">
  <!-- Reusable stencil for WLED palette "hult". Inject the palette colours (/json/palx)
       as stops into #grad; #1a1a1a details carve features. Direction: vertical. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><text x="72" y="106" font-family="Helvetica" font-weight="bold" font-size="96" text-anchor="middle">8</text></g>
</svg>
