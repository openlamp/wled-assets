<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="breeze" data-gradient="horizontal">
  <!-- Reusable stencil for the WLED palette "breeze". Fill by injecting the palette's
       own colours (from /json/palx) as stops into #grad below. Details in #1a1a1a
       carve features. Gradient direction: horizontal. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><g fill="none" stroke="url(#grad)" stroke-width="9" stroke-linecap="round"><path d="M18 50 H92 a15 15 0 1 0 -15 -15"/><path d="M18 78 H108 a15 15 0 1 1 -15 15"/><path d="M18 106 H78 a13 13 0 1 0 -13 -13"/></g></g>
</svg>
