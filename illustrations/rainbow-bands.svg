<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="rainbow bands" data-gradient="horizontal">
  <!-- Reusable stencil for WLED palette "rainbow bands". Inject the palette colours (/json/palx)
       as stops into #grad; #1a1a1a details carve features. Direction: horizontal. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><path d="M18 124 A54 54 0 0 1 126 124" fill="none" stroke="url(#grad)" stroke-width="30" stroke-linecap="round"/></g>
</svg>
