    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><path d="M20 128 L44 78 L60 96 L74 66 L88 92 L104 74 L124 128 Z"/><circle cx="74" cy="52" r="12"/><circle cx="100" cy="60" r="7"/></g>
