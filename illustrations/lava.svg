<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="lava" data-gradient="vertical">
  <!-- Reusable stencil for the WLED palette "lava". Fill by injecting the palette's
       own colours (from /json/palx) as stops into #grad below. Details in #1a1a1a
       carve features. Gradient direction: vertical. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><path d="M20 128 L44 78 L60 96 L74 66 L88 92 L104 74 L124 128 Z"/><circle cx="74" cy="52" r="12"/><circle cx="100" cy="60" r="7"/></g>
</svg>
