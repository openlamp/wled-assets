<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="autumn" data-gradient="vertical">
  <!-- Reusable stencil for the WLED palette "autumn". Fill by injecting the palette's
       own colours (from /json/palx) as stops into #grad below. Details in #1a1a1a
       carve features. Gradient direction: vertical. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><path d="M72 16 C120 40 120 104 72 128 C24 104 24 40 72 16 Z"/><line x1="72" y1="30" x2="72" y2="120" stroke="#1a1a1a" stroke-width="4"/></g>
</svg>
