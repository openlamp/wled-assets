<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="candy2" data-gradient="vertical">
  <!-- Reusable stencil for the WLED palette "candy2". Fill by injecting the palette's
       own colours (from /json/palx) as stops into #grad below. Details in #1a1a1a
       carve features. Gradient direction: vertical. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><circle cx="72" cy="54" r="32"/><path d="M72 54 m0 -22 a22 22 0 1 1 -0.1 0 M72 54 m0 -12 a12 12 0 1 1 -0.1 0" fill="none" stroke="#1a1a1a" stroke-width="4"/><rect x="68" y="84" width="8" height="44"/></g>
</svg>
