<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="orangery" data-gradient="vertical">
  <!-- Reusable stencil for WLED palette "orangery". Inject the palette colours (/json/palx)
       as stops into #grad; #1a1a1a details carve features. Direction: vertical. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><circle cx="72" cy="72" r="42"/><g stroke="#1a1a1a" stroke-width="4"><line x1="72" y1="72" x2="72" y2="30"/><line x1="72" y1="72" x2="72" y2="114"/><line x1="72" y1="72" x2="30" y2="72"/><line x1="72" y1="72" x2="114" y2="72"/><line x1="72" y1="72" x2="42" y2="42"/><line x1="72" y1="72" x2="102" y2="102"/><line x1="72" y1="72" x2="102" y2="42"/><line x1="72" y1="72" x2="42" y2="102"/></g><circle cx="72" cy="72" r="8" fill="#1a1a1a"/></g>
</svg>
