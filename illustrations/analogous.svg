<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="analogous" data-gradient="horizontal">
  <!-- Reusable stencil for WLED palette "analogous". Inject the palette colours (/json/palx)
       as stops into #grad; #1a1a1a details carve features. Direction: horizontal. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><circle cx="72" cy="72" r="42" fill="url(#grad)"/><circle cx="72" cy="72" r="18" fill="#1a1a1a"/></g>
</svg>
