<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="red flash" data-gradient="vertical">
  <!-- Reusable stencil for the WLED palette "red flash". Fill by injecting the palette's
       own colours (from /json/palx) as stops into #grad below. Details in #1a1a1a
       carve features. Gradient direction: vertical. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><path d="M84 16 L42 80 L68 80 L54 128 L104 58 L76 58 Z"/></g>
</svg>
