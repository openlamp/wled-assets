    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><g fill="url(#grad)"><ellipse cx="46" cy="52" rx="18" ry="22"/><ellipse cx="96" cy="46" rx="16" ry="20"/><ellipse cx="72" cy="82" rx="15" ry="19"/></g><g stroke="#1a1a1a" stroke-width="3" fill="none"><path d="M46 74 v40"/><path d="M96 66 v48"/><path d="M72 101 v27"/></g></g>
</svg>
