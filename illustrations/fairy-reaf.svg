<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="fairy reaf" data-gradient="horizontal">
  <!-- Reusable stencil for WLED palette "fairy reaf". Inject the palette colours (/json/palx)
       as stops into #grad; #1a1a1a details carve features. Direction: horizontal. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><g fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round"><path d="M72 128 V72"/><path d="M72 96 L50 70"/><path d="M72 96 L94 70"/><path d="M72 80 L56 58"/><path d="M72 80 L88 58"/></g><g fill="url(#grad)"><circle cx="40" cy="46" r="4"/><circle cx="104" cy="44" r="4"/><circle cx="72" cy="34" r="4"/></g></g>
</svg>
