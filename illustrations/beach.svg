<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="beach" data-gradient="vertical">
  <!-- Reusable stencil for WLED palette "beach". Inject the palette colours (/json/palx)
       as stops into #grad; #1a1a1a details carve features. Direction: vertical. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><circle cx="104" cy="42" r="16"/><path d="M0 88 Q36 70 72 88 T144 88 V120 H0 Z"/><rect x="0" y="118" width="144" height="26"/></g>
</svg>
