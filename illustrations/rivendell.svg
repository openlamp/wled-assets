<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="rivendell" data-gradient="vertical">
  <!-- Reusable stencil for the WLED palette "rivendell". Fill by injecting the palette's
       own colours (from /json/palx) as stops into #grad below. Details in #1a1a1a
       carve features. Gradient direction: vertical. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><path d="M2 128 L38 52 L60 90 L92 40 L142 128 Z"/><path d="M60 128 L86 84 L112 128 Z" fill="#1a1a1a" opacity="0"/></g>
</svg>
