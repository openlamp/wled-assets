<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" data-palette="aqua flash" data-gradient="vertical">
  <!-- Reusable stencil for the WLED palette "aqua flash". Fill by injecting the palette's
       own colours (from /json/palx) as stops into #grad below. Details in #1a1a1a
       carve features. Gradient direction: vertical. -->
  <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#888"/><stop offset="1" stop-color="#ccc"/>
  </linearGradient></defs>
  <g fill="url(#grad)"><circle cx="72" cy="86" r="26"/><circle cx="40" cy="58" r="8"/><circle cx="104" cy="54" r="9"/><circle cx="112" cy="92" r="7"/><circle cx="30" cy="92" r="6"/></g>
</svg>
